<div class="auth-page forsa-gradient-bg">
  <div class="auth-card-wrap">
    <app-forsa-card [noBorder]="true" [shadow]="'sm'">
      <div class="card-pad-lg">
        @if (success()) {
          <h2>Password updated</h2>
          <p>{{ success() }}</p>
          <p class="text-muted sm">Redirecting to sign in…</p>
        } @else {
          <h2>Set a new password</h2>
          <p class="text-muted sm">Choose a strong password for your Forsa account.</p>
          <form class="auth-stack" (ngSubmit)="submit()">
            <div>
              <app-forsa-password-field
                inputId="npw"
                name="npw"
                labelText="New password"
                [(ngModel)]="password"
                autocomplete="new-password"
                placeholder="New password (min. 6 characters)"
                inputClass="input-h-12"
                required
              ></app-forsa-password-field>
            </div>
            <div>
              <app-forsa-password-field
                inputId="cpw"
                name="cpw"
                labelText="Confirm"
                [(ngModel)]="confirm"
                autocomplete="new-password"
                placeholder="Confirm new password"
                inputClass="input-h-12"
                required
              ></app-forsa-password-field>
            </div>
            @if (error()) {
              <p class="text-danger sm">{{ error() }}</p>
            }
            <app-forsa-button type="submit" [disabled]="busy()" [widthFull]="true" size="lg">
              {{ busy() ? 'Saving…' : 'Update password' }}
            </app-forsa-button>
          </form>
          <p class="muted-center sm">
            <a routerLink="/login" class="link-bold">Back to sign in</a>
          </p>
        }
      </div>
    </app-forsa-card>
  </div>
</div>
