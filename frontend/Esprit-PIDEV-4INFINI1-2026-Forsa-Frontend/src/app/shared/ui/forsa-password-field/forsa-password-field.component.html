<div class="password-field">
  <label class="forsa-label" [attr.for]="inputId">{{ labelText }}</label>
  <div class="password-field__control">
    <input
      [id]="inputId"
      forsaInput
      [type]="visible() ? 'text' : 'password'"
      [name]="name"
      [attr.autocomplete]="autocomplete"
      title="{{ labelText }}"
      placeholder="{{ placeholder }}"
      [disabled]="isDisabled"
      [required]="required"
      [value]="value"
      (input)="onInput($event)"
      (blur)="onBlur()"
      [class]="inputClass + ' password-field__input'"
    />
    <button
      type="button"
      class="password-field__toggle"
      [disabled]="isDisabled"
      (click)="toggleVisibility()"
      [attr.aria-label]="visible() ? 'Hide password' : 'Show password'"
      [attr.aria-pressed]="visible()"
    >
      @if (visible()) {
        <app-forsa-icon name="eye-off" [size]="20" />
      } @else {
        <app-forsa-icon name="eye" [size]="20" />
      }
    </button>
  </div>
</div>
